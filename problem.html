<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body{
    background: linear-gradient(to bottom, #E374F9, #F8D8F8);
    background-repeat: no-repeat;
    height: 1000px;
    }
    .card{
        background-color: #e9e9e9;
        position: absolute;
        width: 90%;
        max-width: 600px;
        padding: 60px 40px;
        border-radius: 15px;
        text-align: center;
        display: flex;
        flex-direction: column;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        height: 70%;
    }
    .but{
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(2, 1fr);
        gap:20px;
    }
    .but button{
        background-color: white;
        padding: 20px;
        border: none;
        border-radius: 10px;
    }
</style>
<body>
    <p>Problem 1</p>
    <div class="card">
        <div class="p">
            <p>Lorem Ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.
                Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat.
            </p>
        </div>
        <div class="but">
            <button>A. Lorem</button>
            <button>B. Lorem</button>
            <button>C. Lorem</button>
            <button onclick="location.href= 'score.html'">D. Lorem</button>
        </div>
    </div>
</body> 
</html>
